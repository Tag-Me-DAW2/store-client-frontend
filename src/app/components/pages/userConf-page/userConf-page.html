<div class="user-conf">
    <div class="user-conf__container">
        <header class="user-conf__header">
            <h1 class="user-conf__title">
                Configuración de la cuenta
            </h1>
            <p class="user-conf__subtitle">
                Administra tu información personal y preferencias.
        </header>
        <form [formGroup]="formulario" (ngSubmit)="onSubmit()" class="user-conf__form">
            <section class="user-conf__form__section">
                <h2 class="user-conf__form__section-title">Foto de Perfil</h2>

                <div class="user-conf__form__image__upload">
                    <div class="preview">
                        @if(previewUrl && previewUrl !== '0x00') {
                        <img [src]="previewUrl" alt="Previsualización" class="preview">
                        <button class="preview-delete" (click)="removeImage()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="" aria-hidden="true">
                                <path d="M18 6 6 18"></path>
                                <path d="m6 6 12 12"></path>
                            </svg>
                        </button>
                        } @else {
                        <span>{{ user()?.firstName?.charAt(0) }}</span>
                        }
                    </div>
                    <div class="upload-input">
                        <input type="file" #fileInput accept="image/*" hidden (change)="onFileSelected($event)" />
                        <div class="upload-buttons">
                            <button type="button" class="button-upload" (click)="fileInput.click()">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="button-upload-icon" aria-hidden="true">
                                    <path d="M12 3v12"></path>
                                    <path d="m17 8-5-5-5 5"></path>
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                </svg> Subir imagen
                            </button>
                            @if(previewUrl && previewUrl !== '0x00') {
                            <button type="button" class="button-delete" (click)="removeImage()">
                                Eliminar
                            </button>
                            }
                        </div>
                        <span class="upload-description">JPG, PNG, o GIF. Tamaño máximo 5MB.</span>
                    </div>
                </div>
            </section>
            <section class="user-conf__form__section">
                <h2 class="user-conf__form__section-title">Información personal</h2>

                <div class="section__personal-data">
                    <div class="form__group">
                        <label for="name" class="form__group-label">Nombre</label>
                        <div class="form__group-input">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="form__group-input__svg" aria-hidden="true">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="name" formControlName="name" placeholder="Nombre" minlength="1"
                                fieldError="El nombre es obligatorio" />
                        </div>
                    </div>
                    <div class="form__group">
                        <label for="lastName" class="form__group-label">Apellido</label>
                        <div class="form__group-input">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="form__group-input__svg" aria-hidden="true">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="lastName" formControlName="lastName" placeholder="Apellido"
                                minlength="1" fieldError="El apellido es obligatorio" />
                        </div>
                    </div>
                    <div class="form__group">
                        <label for="username" class="form__group-label">Nombre de usuario</label>
                        <div class="form__group-input">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="form__group-input__svg" aria-hidden="true">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="username" formControlName="username" placeholder="Nombre de usuario"
                                minlength="1" fieldError="El nombre de usuario es obligatorio" />
                        </div>
                    </div>
                    <div class="form__group">
                        <label for="phone" class="form__group-label">Número de teléfono</label>
                        <div class="form__group-input">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="form__group-input__svg" aria-hidden="true">
                                <path
                                    d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384">
                                </path>
                            </svg>
                            <input type="text" id="phone" formControlName="phone" placeholder="+34 600 000 000"
                                fieldError="El número de teléfono es obligatorio" />
                        </div>
                    </div>
                    <div class="form__group form__group-expand">
                        <label for="email" class="form__group-label">Email</label>
                        <div class="form__group-input">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="form__group-input__svg" aria-hidden="true">
                                <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path>
                                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            </svg>
                            <input type="email" id="email" formControlName="email" placeholder="tu@email.com"
                                fieldError="El email es obligatorio" />
                        </div>
                    </div>
                </div>
            </section>
            <section class="user-conf__form__section">
                <h2 class="user-conf__form__section-title">Seguridad</h2>
                <div class="section-password">
                    <div class="form__group">
                        <label for="password" class="form__group-label">Contraseña</label>
                        <div class="form__group-input">
                            <input type="password" id="password" formControlName="password"
                                placeholder="Dejar en blanco para no cambiar" />
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="form__group-input__svg" aria-hidden="true">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <button type="button" class="form__group-input__btn-eye"
                                (click)="togglePasswordVisibility(1)">
                                @if(eyeIcon) {
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="form__group-input__svg-eye" aria-hidden="true">
                                    <path
                                        d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49">
                                    </path>
                                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"></path>
                                    <path
                                        d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143">
                                    </path>
                                    <path d="m2 2 20 20"></path>
                                </svg>
                                } @else {
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="form__group-input__svg-eye" aria-hidden="true">
                                    <path
                                        d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0">
                                    </path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                }
                            </button>
                        </div>
                    </div>
                    <div class="form__group">
                        <label for="passwordConfirm" class="form__group-label">Confirmar nueva contraseña</label>
                        <div class="form__group-input">
                            <input type="password" id="passwordConfirm" formControlName="passwordConfirm"
                                placeholder="Confirmar nueva contraseña" fieldError="Las contraseñas no coinciden" />
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="form__group-input__svg" aria-hidden="true">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <button type="button" class="form__group-input__btn-eye"
                                (click)="togglePasswordVisibility(2)">
                                @if(eyeIcon2) {
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="form__group-input__svg-eye" aria-hidden="true">
                                    <path
                                        d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49">
                                    </path>
                                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"></path>
                                    <path
                                        d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143">
                                    </path>
                                    <path d="m2 2 20 20"></path>
                                </svg>
                                } @else {
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="form__group-input__svg-eye" aria-hidden="true">
                                    <path
                                        d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0">
                                    </path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                }
                            </button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="form-actions">
                <button class="action-cancel">Cancelar</button>
                <button type="submit" class="action-save" [disabled]="!isFormValid">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="action-save__svg" aria-hidden="true">
                        <path
                            d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z">
                        </path>
                        <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"></path>
                        <path d="M7 3v4a1 1 0 0 0 1 1h7"></path>
                    </svg> Guardar cambios</button>
            </div>
        </form>
    </div>
</div>
