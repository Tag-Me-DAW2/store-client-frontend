<div class="cart-item">
    <div class="cart-item__image">
        <img [src]="item.product.image" [alt]="item.product.name">
    </div>
    <div class="cart-item__details">
        <div class="cart-item__info">
            <h4 class="cart-item__name">{{ item.productName }}</h4>
            <span class="cart-item__info-wrapper">
                <p class="cart-item__price">{{ item.basePrice | currency }}</p>
                @if (item.discountPercentage > 0) {
                <p class="cart-item__discount">-{{ item.discountPercentage }}%</p>
                }
            </span>
        </div>
        <div class="cart-item__actions">
            <div class="cart-item__quantity">
                <button class="cart-item__quantity-btn" (click)="onDecrement()" [disabled]="item.quantity <= 1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"></path>
                    </svg>
                </button>
                <span class="cart-item__quantity-value">{{ item.quantity }}</span>
                <button class="cart-item__quantity-btn" (click)="onIncrement()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"></path>
                        <path d="M12 5v14"></path>
                    </svg>
                </button>
            </div>
            <button class="cart-item__remove-btn" (click)="onRemove()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                    <line x1="10" x2="10" y1="11" y2="17"></line>
                    <line x1="14" x2="14" y1="11" y2="17"></line>
                </svg>
            </button>
        </div>
    </div>
    <div class="cart-item__total">
        <span>{{ item.total | currency }}</span>
    </div>
</div>
