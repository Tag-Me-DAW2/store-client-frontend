<div class="cart-summary">
    <div class="cart-summary__row">
        <span class="cart-summary__label">Subtotal</span>
        <span class="cart-summary__value">{{ subtotal | currency }}</span>
    </div>
    <div class="cart-summary__row">
        <span class="cart-summary__label">Envío</span>
        <span class="cart-summary__value" [class.cart-summary__value--free]="shipping === 0">
            @if (shipping === 0) {
                Gratis
            } @else {
                {{ shipping | currency }}
            }
        </span>
    </div>
    @if (shipping > 0) {
    <div class="cart-summary__shipping-note">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 16v-4"></path>
            <path d="M12 8h.01"></path>
        </svg>
        <span>Envío gratis en pedidos superiores a 50€</span>
    </div>
    }
    <div class="cart-summary__divider"></div>
    <div class="cart-summary__row cart-summary__row--total">
        <span class="cart-summary__label cart-summary__label--total">Total</span>
        <span class="cart-summary__value cart-summary__value--total">{{ total | currency }}</span>
    </div>
    <button 
        class="cart-summary__checkout-btn" 
        (click)="onCheckout()"
        [disabled]="isProcessing || !hasItems">
        @if (isProcessing) {
            <svg class="cart-summary__spinner" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
            </svg>
            <span>Procesando...</span>
        } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="14" x="2" y="5" rx="2"></rect>
                <line x1="2" x2="22" y1="10" y2="10"></line>
            </svg>
            <span>Proceder al pago</span>
        }
    </button>
</div>
