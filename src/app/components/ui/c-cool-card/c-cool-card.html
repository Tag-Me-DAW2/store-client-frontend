<div class="cool-card">
    <div class="cool-card__gradient-overlay"></div>
    <div class="cool-card__glowing-circle"></div>
    <div class="cool-card__info">
        <span>
            <h3 class="cool-card__holder-name" motion [x]="-20" [opacity]="0" [delay]="500">Pepe</h3>
            <p class="cool-card__holder-description" motion [x]="-20" [opacity]="0" [delay]="600">Mozo de almacén</p>
        </span>
        <span>
            <div class="cool-card__holder-socials" motion [x]="-20" [opacity]="0" [delay]="700">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-mail h-4 w-4" aria-hidden="true">
                    <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path>
                    <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                </svg>
                <span>pepe@gmail.com</span>
            </div>
            <div class="cool-card__holder-socials" motion [x]="-20" [opacity]="0" [delay]="800">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-linkedin h-4 w-4" aria-hidden="true">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                    <rect width="4" height="12" x="2" y="9"></rect>
                    <circle cx="4" cy="4" r="2"></circle>
                </svg>
                <span>linkedin.com/in/pepe</span>
            </div>
        </span>
        <div class="cool-card__pulsing-phone">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-smartphone h-6 w-6 text-accent" aria-hidden="true">
                <rect width="14" height="20" x="5" y="2" rx="2" ry="2"></rect>
                <path d="M12 18h.01"></path>
            </svg>
        </div>
    </div>
    <div class="cool-card__shine-effect"></div>
</div>
