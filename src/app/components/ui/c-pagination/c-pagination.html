<div class="pagination">
    <button class="pagination__arrow-button" (click)="previousPage()" [disabled]="currentPageNumber === 1">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-chevron-left h-5 w-5" aria-hidden="true">
            <path d="m15 18-6-6 6-6"></path>
        </svg>
    </button>
    <div class="pagination__pages-wrapper">
        @for (page of pages; track $index) {
        <button class="pagination__page-number" (click)="goToPage(page)"
            [class.--active]="page === currentPageNumber">{{
            page }}</button>
        }
    </div>
    <button class="pagination__arrow-button" (click)="nextPage()" [disabled]="currentPageNumber >= totalPages">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-chevron-right h-5 w-5" aria-hidden="true">
            <path d="m9 18 6-6-6-6"></path>
        </svg>
    </button>
</div>
